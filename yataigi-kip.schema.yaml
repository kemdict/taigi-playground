    - xform/n9/n̋/
    - xform/o1/o/
    - xform/o2/ó/
    - xform/o3/ò/
    - xform/o4/o/
    - xform/o5/ô/
    - xform/o6/ǒ/
    - xform/o7/ō/
    - xform/o8/o̍/
    - xform/o9/ő/
    - xform/u1/u/
    - xform/u2/ú/

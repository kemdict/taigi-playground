custom_phrase:
  dictionary: ""
  user_dict: custom_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 1

menu:
  alternative_select_keys: "ABCDEFGHIJ"

speller:
  alphabet: "abceghijklmnoprstu123456789-"
  initials: "abceghijklmnoprstu"
  finals: "123456789-"
  delimiter: " "
  # use_space: true
  algebra:
    - derive/\d$// # Ignore tones
    - xform/oonn/onn/ # misspell helper

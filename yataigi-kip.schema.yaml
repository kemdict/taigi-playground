# Rime schema
# encoding: utf-8

schema:
  name: 台語
  schema_id: taigi-kip
  version: "0.2"
  description: |
    臺語輸入法（教育部羅馬字）
    會當選用漢羅/全羅。
  author:
    - Kisaragi Hiu <mail@kisaragi-hiu.com>

switches:
  - name: ascii_mode
    reset: 0
    states: ["台語", "英數"]
  - name: full_shape
    reset: 0
    states: ["半形", "全形"]
  - name: han
    reset: 0
    options: [han, lomaji]
    states: ["漢羅", "tsuân-lô"]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - fluency_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator@custom_phrase
    - script_translator
  filters:
    - uniquifier

translator:
  dictionary: taigi-kip
  enable_user_dict: false # remain false for development, for users true is better
  spelling_hints: 8
  always_show_comments: true
  # preedit_format:
  #   - xlit/a/b/
  comment_format:
    - xform/a1/a/
    - xform/a2/á/
    - xform/a3/à/
    - xform/a4/a/
    - xform/a5/â/
    - xform/a6/ǎ/
    - xform/a7/ā/
    - xform/a8/a̍/
    - xform/a9/a̋/
    - xform/e1/e/
    - xform/e2/é/
    - xform/e3/è/
    - xform/e4/e/
    - xform/e5/ê/
    - xform/e6/ě/
    - xform/e7/ē/
    - xform/e8/e̍/
    - xform/e9/e̋/
    - xform/i1/i/
    - xform/i2/í/
    - xform/i3/ì/
    - xform/i4/i/
    - xform/i5/î/
    - xform/i6/ǐ/
    - xform/i7/ī/
    - xform/i8/i̍/
    - xform/i9/i̋/
    - xform/m1/m/
    - xform/m2/ḿ/
    - xform/m3/m̀/
    - xform/m4/m/
    - xform/m5/m̂/
    - xform/m6/m̌/
    - xform/m7/m̄/
    - xform/m8/m̍/
    - xform/m9/m̋/
    - xform/n1/n/
    - xform/n2/ń/
    - xform/n3/ǹ/
    - xform/n4/n/
    - xform/n5/n̂/
    - xform/n6/ň/
